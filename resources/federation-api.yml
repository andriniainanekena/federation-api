openapi: 3.0.3
info:
  title: API Fédération de Collectivités Agricoles
  description: |
    API REST pour la gestion digitale de la fédération de collectivités agricoles à Madagascar.
    Elle couvre l'ensemble des processus administratifs : gestion des collectivités et de leurs membres,
    cotisations, trésorerie, activités, assiduité et statistiques.
  version: 2.0.0

servers:
  - url: http://localhost:8080
    description: Serveur local de développement
  - url: https://api.federation-agricole.mg
    description: Serveur principal

tags:
  - name: Collectivités
    description: Gestion et ouverture des collectivités agricoles
  - name: Membres
    description: Admission, transfert, démission et mandats des membres
  - name: Cotisations
    description: Cotisations périodiques, ponctuelles et paiements
  - name: Trésorerie
    description: Gestion des comptes de trésorerie
  - name: Activités
    description: Planification des activités des collectivités et de la fédération
  - name: Assiduité
    description: Suivi des présences aux activités
  - name: Statistiques Collectivité
    description: Statistiques et rapports au niveau de chaque collectivité
  - name: Statistiques Fédération
    description: Statistiques et rapports globaux de la fédération

paths:

  /collectivites:
    get:
      tags: [Collectivités]
      summary: Lister toutes les collectivités
      operationId: listCollectivites
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: ville
          in: query
          schema:
            type: string
          description: Filtrer par ville
        - name: specialite
          in: query
          schema:
            type: string
          description: Filtrer par spécialité agricole
      responses:
        '200':
          description: Liste paginée des collectivités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCollectivite'

    post:
      tags: [Collectivités]
      summary: Soumettre une demande d'ouverture d'une nouvelle collectivité
      operationId: createCollectivite
      description: |
        Conditions requises pour l'ouverture d'une nouvelle collectivité :
        - Au moins 10 membres inscrits, dont 5 ayant une ancienneté d'au moins 6 mois au sein de la fédération
        - Les postes spécifiques (président, président adjoint, trésorier, secrétaire) doivent être pourvus, pouvant être inclus dans les 10 membres minimum
        - L'autorisation formelle de la fédération est obligatoire
        - La ville et la spécialité agricole doivent être définies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreationRequest'
      responses:
        '201':
          description: Collectivité créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}:
    get:
      tags: [Collectivités]
      summary: Obtenir les détails d'une collectivité
      operationId: getCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        '200':
          description: Détails de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Collectivités]
      summary: Mettre à jour une collectivité
      operationId: updateCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteUpdateRequest'
      responses:
        '200':
          description: Collectivité mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/autorisation:
    post:
      tags: [Collectivités]
      summary: Accorder ou refuser l'autorisation d'ouverture d'une collectivité
      operationId: autoriserOuvertureCollectivite
      description: Endpoint réservé à la fédération pour valider ou rejeter une demande d'ouverture.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [autorise]
              properties:
                autorise:
                  type: boolean
                motif:
                  type: string
                  description: Motif obligatoire en cas de refus
      responses:
        '200':
          description: Décision enregistrée avec succès
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/membres:
    get:
      tags: [Membres]
      summary: Lister les membres d'une collectivité
      operationId: listMembresCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: poste
          in: query
          schema:
            $ref: '#/components/schemas/Poste'
          description: Filtrer par poste
      responses:
        '200':
          description: Liste paginée des membres de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageMembre'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Membres]
      summary: Admettre un nouveau membre dans une collectivité
      operationId: admettreMembreCollectivite
      description: |
        Conditions d'admission mises à jour :
        - Le candidat doit être parrainé par au moins deux membres confirmés de la fédération
        - Le nombre de parrains appartenant à la collectivité cible doit être supérieur ou égal au nombre de parrains issus d'autres collectivités
        - Le candidat doit fournir ses informations personnelles ainsi que la nature de sa relation avec chaque parrain (famille, ami, collègue, etc.)
        - Le candidat doit régler les frais d'adhésion de 50 000 MGA ainsi que l'intégralité des cotisations annuelles obligatoires imposées par la collectivité
        - Le paiement s'effectue uniquement par virement bancaire ou mobile money
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionMembreRequest'
      responses:
        '201':
          description: Membre admis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres/{membreId}:
    get:
      tags: [Membres]
      summary: Obtenir les détails d'un membre dans une collectivité
      operationId: getMembreCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      responses:
        '200':
          description: Détails du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/membres/{membreId}/transfert:
    post:
      tags: [Membres]
      summary: Transférer un membre vers une autre collectivité
      operationId: transfererMembre
      description: Un membre peut changer de collectivité, par exemple suite à un changement de ville.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nouvelleCollectiviteId, motif]
              properties:
                nouvelleCollectiviteId:
                  type: integer
                  description: Identifiant de la collectivité de destination
                motif:
                  type: string
                  example: Changement de ville
      responses:
        '200':
          description: Transfert effectué avec succès
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres/{membreId}/demission:
    post:
      tags: [Membres]
      summary: Enregistrer la démission d'un membre
      operationId: demissionnerMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motif, dateDemission]
              properties:
                motif:
                  type: string
                dateDemission:
                  type: string
                  format: date
      responses:
        '200':
          description: Démission enregistrée avec succès
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/mandats:
    get:
      tags: [Membres]
      summary: Lister les mandats d'une collectivité
      operationId: listMandats
      description: Un mandat dure une année civile. Chaque membre ne peut occuper un même poste spécifique plus de deux fois.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: annee
          in: query
          schema:
            type: integer
          description: Filtrer par année civile
      responses:
        '200':
          description: Liste des mandats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mandat'

    post:
      tags: [Membres]
      summary: Enregistrer les résultats d'élection pour un nouveau mandat
      operationId: createMandat
      description: |
        Enregistre les résultats du vote de fin d'année pour le mandat de l'année suivante.
        Chaque poste spécifique (président, président adjoint, trésorier, secrétaire) ne peut être occupé
        que par un seul membre par mandat, et ce même membre ne peut pas dépasser deux mandats sur le même poste.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MandatRequest'
      responses:
        '201':
          description: Mandat créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandat'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /federation/mandats:
    get:
      tags: [Membres]
      summary: Lister les mandats de la fédération
      operationId: listMandatsFederation
      description: Les mandats de la fédération durent 2 ans. Le président doit avoir été ou être actuellement président d'une collectivité.
      parameters:
        - name: annee
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Liste des mandats de la fédération
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MandatFederation'

    post:
      tags: [Membres]
      summary: Enregistrer les résultats d'élection pour un mandat de la fédération
      operationId: createMandatFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MandatFederationRequest'
      responses:
        '201':
          description: Mandat fédéral créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MandatFederation'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/cotisations:
    get:
      tags: [Cotisations]
      summary: Lister les cotisations définies pour une collectivité
      operationId: listCotisations
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCotisation'
        - $ref: '#/components/parameters/DateDebut'
        - $ref: '#/components/parameters/DateFin'
      responses:
        '200':
          description: Liste des cotisations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cotisation'

    post:
      tags: [Cotisations]
      summary: Définir une nouvelle cotisation pour la collectivité
      operationId: createCotisation
      description: |
        Les cotisations peuvent être périodiques (mensuelles ou annuelles) ou ponctuelles.
        Un pourcentage des cotisations périodiques est reversé à la fédération.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotisationRequest'
      responses:
        '201':
          description: Cotisation définie avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres/{membreId}/paiements:
    get:
      tags: [Cotisations]
      summary: Lister les paiements de cotisations d'un membre
      operationId: listPaiementsMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
        - $ref: '#/components/parameters/DateDebut'
        - $ref: '#/components/parameters/DateFin'
      responses:
        '200':
          description: Liste des paiements du membre
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Paiement'

    post:
      tags: [Cotisations]
      summary: Enregistrer un paiement de cotisation
      operationId: enregistrerPaiement
      description: |
        Le trésorier enregistre chaque encaissement avec le montant, la date et le mode de paiement.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaiementRequest'
      responses:
        '201':
          description: Paiement enregistré avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paiement'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/comptes:
    get:
      tags: [Trésorerie]
      summary: Lister les comptes de trésorerie d'une collectivité
      operationId: listComptes
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: Liste des comptes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

    post:
      tags: [Trésorerie]
      summary: Ajouter un compte de trésorerie à une collectivité
      operationId: createCompte
      description: |
        Une collectivité ne peut posséder qu'une seule caisse. Elle peut en revanche avoir
        plusieurs comptes bancaires et plusieurs comptes mobile money.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
      responses:
        '201':
          description: Compte créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/comptes/{compteId}:
    get:
      tags: [Trésorerie]
      summary: Obtenir les détails d'un compte
      operationId: getCompte
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/CompteId'
      responses:
        '200':
          description: Détails du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Trésorerie]
      summary: Mettre à jour un compte
      operationId: updateCompte
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/CompteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
      responses:
        '200':
          description: Compte mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Trésorerie]
      summary: Supprimer un compte
      operationId: deleteCompte
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/CompteId'
      responses:
        '204':
          description: Compte supprimé avec succès
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/comptes/{compteId}/solde:
    get:
      tags: [Trésorerie]
      summary: Consulter le solde d'un compte à une date donnée
      operationId: getSoldeCompte
      description: Le solde est exprimé en Ariary (MGA) par défaut.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/CompteId'
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Date à laquelle consulter le solde. Par défaut, la date du jour.
      responses:
        '200':
          description: Solde du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeCompte'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/comptes:
    get:
      tags: [Trésorerie]
      summary: Lister les comptes de trésorerie de la fédération
      operationId: listComptesFederation
      description: La fédération obéit aux mêmes règles que les collectivités (une seule caisse, plusieurs comptes bancaires et mobile money possibles).
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: Liste des comptes de la fédération
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

    post:
      tags: [Trésorerie]
      summary: Ajouter un compte de trésorerie à la fédération
      operationId: createCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
      responses:
        '201':
          description: Compte créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /federation/comptes/{compteId}:
    get:
      tags: [Trésorerie]
      summary: Obtenir les détails d'un compte de la fédération
      operationId: getCompteFederation
      parameters:
        - $ref: '#/components/parameters/CompteId'
      responses:
        '200':
          description: Détails du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Trésorerie]
      summary: Mettre à jour un compte de la fédération
      operationId: updateCompteFederation
      parameters:
        - $ref: '#/components/parameters/CompteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
      responses:
        '200':
          description: Compte mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Trésorerie]
      summary: Supprimer un compte de la fédération
      operationId: deleteCompteFederation
      parameters:
        - $ref: '#/components/parameters/CompteId'
      responses:
        '204':
          description: Compte supprimé avec succès
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/comptes/{compteId}/solde:
    get:
      tags: [Trésorerie]
      summary: Consulter le solde d'un compte de la fédération à une date donnée
      operationId: getSoldeCompteFederation
      parameters:
        - $ref: '#/components/parameters/CompteId'
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Solde du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeCompte'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites:
    get:
      tags: [Activités]
      summary: Lister les activités d'une collectivité
      operationId: listActivitesCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeActivite'
        - $ref: '#/components/parameters/DateDebut'
        - $ref: '#/components/parameters/DateFin'
      responses:
        '200':
          description: Liste des activités
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activite'

    post:
      tags: [Activités]
      summary: Planifier une activité pour une collectivité
      operationId: createActiviteCollectivite
      description: |
        Deux activités à présence obligatoire existent par défaut :
        - L'assemblée générale mensuelle, dont la date est fixée annuellement sur un même jour récurrent
        - La formation obligatoire pour les membres juniors, dont la date est fixée annuellement sur un même jour récurrent

        Des activités exceptionnelles peuvent être organisées à la discrétion de la collectivité.
        La collectivité définit si la présence est obligatoire pour tous ou pour certains postes uniquement.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteRequest'
      responses:
        '201':
          description: Activité planifiée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/activites/{activiteId}:
    get:
      tags: [Activités]
      summary: Obtenir les détails d'une activité
      operationId: getActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        '200':
          description: Détails de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Activités]
      summary: Modifier une activité planifiée
      operationId: updateActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteRequest'
      responses:
        '200':
          description: Activité mise à jour avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Activités]
      summary: Supprimer une activité planifiée
      operationId: deleteActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        '204':
          description: Activité supprimée avec succès
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/activites:
    get:
      tags: [Activités]
      summary: Lister les activités planifiées par la fédération
      operationId: listActivitesFederation
      parameters:
        - $ref: '#/components/parameters/DateDebut'
        - $ref: '#/components/parameters/DateFin'
      responses:
        '200':
          description: Liste des activités fédérales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActiviteFederale'

    post:
      tags: [Activités]
      summary: Planifier une activité au niveau fédéral
      operationId: createActiviteFederation
      description: |
        La fédération peut planifier des activités auxquelles les collectivités sont invitées,
        comme une assemblée générale annuelle. La présence peut être obligatoire ou non.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteFederaleRequest'
      responses:
        '201':
          description: Activité fédérale planifiée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteFederale'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/activites/{activiteId}/presences:
    get:
      tags: [Assiduité]
      summary: Obtenir la fiche de présence d'une activité
      operationId: getPresences
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        '200':
          description: Fiche de présence de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Assiduité]
      summary: Enregistrer la présence d'un membre à une activité
      operationId: enregistrerPresence
      description: |
        Le secrétaire enregistre la présence des membres. Un membre d'une autre collectivité peut
        également figurer dans la fiche de présence, mais sa présence ne sera pas comptabilisée
        dans son taux d'assiduité annuel.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceRequest'
      responses:
        '201':
          description: Présence enregistrée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Presence'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/activites/{activiteId}/presences/{membreId}:
    put:
      tags: [Assiduité]
      summary: Mettre à jour le statut de présence d'un membre
      operationId: updatePresence
      description: Permet notamment d'excuser l'absence d'un membre qui en avait informé le secrétaire à l'avance.
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceUpdateRequest'
      responses:
        '200':
          description: Statut de présence mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Presence'
        '404':
          $ref: '#/components/responses/NotFound'
